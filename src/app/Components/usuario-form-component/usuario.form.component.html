<div class="container d-flex justify-content-center p-4">
    <div class="col-12 col-lg-12">

        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-primary text-white text-center py-4 border-0">
                <h3 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i>Registrar Usuario</h3>
                <p class="mb-0 text-white-50 small">Completa los datos para crear una nueva cuenta</p>
            </div>
        </div>
        <div class="card-body p-4 p-md-5">
            <form [formGroup]="form" (submit)="enviarDatos()">
                <h5 class="form-section-title mt-0"><i class="bi bi-shield-lock me-2"></i>Datos de la Cuenta</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <label for="" class="form-label">Usuario</label>
                        <input type="text" class="form-control" placeholder="Usuario">
                    </div>
                    <div class="col-md-3">
                        <label for="" class="form-label">Correo electronico</label>
                        <input type="text" class="form-control" placeholder="Correo electronico">
                    </div>
                    <div class="col-md-3">
                        <label for="" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" placeholder="Contraseña">
                    </div>
                    <div class="col-md-3">
                        <label for="rol" class="form-label">Rol</label>
                        <select name="rol" id="rol" class="form-select">
                            <option value="0">Seleccione un rol</option>
                            @for(rol of roles; track rol.idRol){
                            <option value="{{rol.idRol}}">{{rol.nombre}}</option>
                            }
                        </select>
                    </div>
                </div>
                <h5 class="form-section-title mt-0"><i class="bi bi-person-lines-fill me-2"></i>Información general</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="nombre" formControlName="nombre"
                            placeholder="Gabriel">
                    </div>
                    <div class="col-md-4">
                        <label for="apellidoPaterno" class="form-label">Apellido Paterno</label>
                        <input type="text" class="form-control" id="apellidoPaterno" formControlName="apellidoPaterno"
                            placeholder="Garcia">
                    </div>
                    <div class="col-md-4">
                        <label for="apellidoMaterno" class="form-label">Apellido Materno</label>
                        <input type="text" class="form-control" id="apellidoMaterno" formControlName="apellidoMaterno"
                            placeholder="Gonzalez">
                    </div>
                    <div class="col-md-4">
                        <label for="fechaNacimiento" class="form-label">Fecha de Nacimiento</label>
                        <input type="date" class="form-control" id="fechaNacimiento" formControlName="fechaNacimiento">
                    </div>
                    <div class="col-md-4">
                        <label for="curp" class="form-label">CURP</label>
                        <input type="text" class="form-control" id="curp" formControlName="curp"
                            placeholder="GATGXXXXXXHDFRRBA0">
                    </div>
                    <div class="col-md-4">
                        <label for="sexo" class="form-label d-block">Sexo</label>
                        <div class="form-check form-check-inline mt-2">
                            <label for="rbHombre" class="form-check-label">Hombre</label>
                            <input type="radio" name="rbHombre" id="rbHombre" value="M" class="form-check-input">
                        </div>
                        <div class="form-check form-check-inline mt-2">
                            <label for="rbMujer" class="form-check-label">Mujer</label>
                            <input type="radio" name="rbMujer" id="rbMujer" value="F" class="form-check-input">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label for="celular" class="form-label">Celular</label>
                        <input type="text" class="form-control" id="celular" formControlName="celular">
                    </div>
                    <div class="col-md-4">
                        <label for="telefono" class="form-label">Telefono Fijo</label>
                        <input type="text" class="form-control" id="telefono" formControlName="telefono">
                    </div>
                </div>
                <h5 class="form-section-title"><i class="bi bi-geo-alt me-2"></i>Dirección</h5>
                <div class="row g-3 mb-4" formGroupName="direcciones">
                    <div class="col-md-4">
                        <label for="calle" class="form-label">Calle</label>
                        <input type="text" class="form-control" id="calle" formControlName="calle"
                            placeholder="Av. Principal">
                    </div>
                    <div class="col-md-4">
                        <label for="numeroExterior" class="form-label">Numero exterior</label>
                        <input type="text" class="form-control" id="numeroExterior" formControlName="numeroExterior"
                            placeholder="Ej: 1001">
                    </div>
                    <div class="col-md-4">
                        <label for="numeroExterior" class="form-label">Numero exterior</label>
                        <input type="text" class="form-control" id="numeroExterior" formControlName="numeroExterior"
                            placeholder="Ej: 1001">
                    </div>
                    <div class="col-md-4">
                        <label for="codigoPostal" class="form-label">Codigo Postal</label>
                        <input type="text" class="form-control" id="codigoPostal" formControlName="codigoPostal"
                            placeholder="Ej: 1001">
                    </div>

                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Crear Cuenta</button>
                </div>
            </form>
        </div>


    </div>
</div>
